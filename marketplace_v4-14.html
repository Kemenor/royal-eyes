<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marketplace — Campaign Reference</title>
<style>
:root {
  --ink: #3a2415;
  --parchment: #f3e6c2;
  --parchment-dim: #c8b080;
  --accent: #a64a30;
  --accent-dark: #7a3020;
  --cyan: #4ec0d4;
  --panel-bg: #120e08;
  --panel-mid: #1e1208;
  --panel-border: #5a3218;
  --panel-border-light: #7a4a28;
  --text-muted: #7a5a30;
  --gm-color: #d06040;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--panel-bg);
  font-family: "Palatino Linotype", Palatino, Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── TOP BAR ── */
#topbar {
  background: #0e0a04;
  border-bottom: 1px solid var(--panel-border);
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 50;
}

#topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

#breadcrumb {
  font-family: "Cinzel", Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

#breadcrumb .crumb {
  cursor: pointer;
  transition: color 0.15s;
}
#breadcrumb .crumb:hover { color: var(--parchment); }
#breadcrumb .crumb.active { color: var(--parchment); cursor: default; }
#breadcrumb .sep { opacity: 0.4; }

#site-title {
  font-family: "Cinzel", Georgia, serif;
  font-size: 15px;
  letter-spacing: 0.25em;
  color: var(--parchment);
  font-weight: 700;
}

#topbar-right { display: flex; align-items: center; gap: 10px; }

#gmBtn {
  background: none;
  border: 1px solid var(--panel-border-light);
  border-radius: 3px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: "Cinzel", Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
#gmBtn:hover { border-color: var(--accent); color: #c07040; }
#gmBtn.active { border-color: var(--accent); color: var(--gm-color); background: rgba(100,30,10,0.2); }

#gm-strip {
  display: none;
  background: rgba(100,30,10,0.3);
  border-bottom: 1px solid var(--accent);
  padding: 4px 20px;
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--gm-color);
  text-align: center;
  flex-shrink: 0;
}
body.gm-mode #gm-strip { display: block; }

/* ── MAIN LAYOUT ── */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: #0e0a04;
  border-left: 1px solid var(--panel-border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  order: 2;
}

.sidebar-section {
  border-bottom: 1px solid var(--panel-border);
  padding: 12px 0 8px;
}

.sidebar-section-title {
  font-family: "Cinzel", Georgia, serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 0 14px 8px;
}

.sidebar-btn {
  display: block;
  width: 100%;
  padding: 7px 14px;
  background: none;
  border: none;
  text-align: left;
  cursor: pointer;
  font-family: "Cinzel", Georgia, serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #a07840;
  transition: all 0.15s;
  border-left: 2px solid transparent;
}
.sidebar-btn:hover {
  color: var(--parchment);
  background: rgba(90,50,20,0.2);
  border-left-color: var(--accent);
}
.sidebar-btn.active {
  color: var(--parchment);
  background: rgba(90,50,20,0.3);
  border-left-color: var(--accent);
}
.sidebar-btn.back-btn {
  color: var(--text-muted);
  font-size: 10px;
}
.sidebar-btn.back-btn:hover { color: var(--parchment-dim); }

/* ── CONTENT AREA ── */
#content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  order: 1;
}

/* ── VISUAL AREA ── */
#visual {
  flex-shrink: 0;
  background: #1a1008;
  border-bottom: 1px solid var(--panel-border);
  position: relative;
}

#visual.map-mode {
  /* map takes natural SVG aspect ratio */
}



#map-container {
  width: 100%;
}
#map-container svg {
  display: block;
  width: 100%;
  height: auto;
}

#visual-placeholder {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  height: 100%;
  padding: 20px;
}
#visual-placeholder .ph-title {
  font-family: "Cinzel", Georgia, serif;
  font-size: clamp(18px, 3vw, 32px);
  letter-spacing: 0.2em;
  color: var(--parchment);
  text-align: center;
}
#visual-placeholder .ph-sub {
  font-size: 12px;
  font-style: italic;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
#visual-placeholder .ph-icon {
  font-size: 48px;
  opacity: 0.15;
}

/* Map quick-blurb below map */
#map-blurb {
  display: none;
  padding: 16px 20px;
  border-bottom: 1px solid var(--panel-border);
  background: var(--panel-mid);
  animation: fadeIn 0.2s ease;
}
#map-blurb.visible { display: block; }
#map-blurb-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
#map-blurb-name {
  font-family: "Cinzel", Georgia, serif;
  font-size: 14px;
  letter-spacing: 0.15em;
  color: var(--parchment);
}
#map-blurb-tag {
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 2px 8px;
  border-radius: 2px;
}
#map-blurb-desc {
  font-size: 13px;
  color: var(--parchment-dim);
  font-style: italic;
  line-height: 1.65;
  margin-bottom: 10px;
}
#map-blurb-goto {
  background: none;
  border: 1px solid var(--panel-border-light);
  border-radius: 2px;
  padding: 5px 12px;
  cursor: pointer;
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #a07840;
  transition: all 0.15s;
}
#map-blurb-goto:hover { border-color: var(--accent); color: var(--parchment); }
#map-blurb-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 16px; padding: 0 4px;
  transition: color 0.15s;
}
#map-blurb-close:hover { color: var(--parchment); }

/* ── INFO PANEL ── */
#info-panel {
  flex: 1;
  padding: 20px;
  display: none;
}
#info-panel.visible { display: block; }

.info-section {
  margin-bottom: 20px;
}

.info-label {
  font-family: "Cinzel", Georgia, serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.info-title {
  font-family: "Cinzel", Georgia, serif;
  font-size: 22px;
  letter-spacing: 0.15em;
  color: var(--parchment);
  margin-bottom: 4px;
}

.info-tag {
  display: inline-block;
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 2px 10px;
  border-radius: 2px;
  margin-right: 6px;
  margin-bottom: 4px;
}

.info-desc {
  font-size: 14px;
  color: var(--parchment-dim);
  font-style: italic;
  line-height: 1.7;
}

.detail-table { width: 100%; border-collapse: collapse; }
.detail-table td {
  padding: 5px 0;
  vertical-align: top;
  border-bottom: 1px solid rgba(90,50,20,0.2);
  font-size: 13px;
}
.detail-table td:first-child {
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  width: 100px;
  padding-right: 12px;
  padding-top: 7px;
}
.detail-table td:last-child { color: #d4b880; line-height: 1.55; }

.gm-detail-table { display: none; }
body.gm-mode .gm-detail-table { display: table; width: 100%; border-collapse: collapse; }
body.gm-mode .gm-detail-table td {
  padding: 5px 0;
  vertical-align: top;
  border-bottom: 1px solid rgba(160,60,20,0.2);
  font-size: 13px;
}
body.gm-mode .gm-detail-table td:first-child {
  font-family: "Cinzel", Georgia, serif;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: #a05030;
  width: 100px;
  padding-right: 12px;
  padding-top: 7px;
}
body.gm-mode .gm-detail-table td:last-child { color: #c09060; line-height: 1.55; }

.gm-note {
  display: none;
  background: rgba(100,30,10,0.25);
  border-left: 2px solid var(--accent);
  padding: 10px 14px;
  border-radius: 0 2px 2px 0;
  font-size: 13px;
  color: #c08060;
  font-style: italic;
  line-height: 1.6;
}
body.gm-mode .gm-note { display: block; }
.gm-only-tag { display: none !important; }
body.gm-mode .gm-only-tag { display: inline-block !important; }

  .gm-only-tag { display: none !important; }
body.gm-mode .gm-only-tag { display: inline-block !important; }

.gm-note strong {
  font-style: normal;
  color: var(--gm-color);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block;
  margin-bottom: 4px;
}

.divider {
  border: none;
  border-top: 1px solid var(--panel-border);
  margin: 16px 0;
}

/* Character list */
.char-list { display: flex; flex-direction: column; gap: 8px; }
.char-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: rgba(30,18,8,0.8);
  border: 1px solid var(--panel-border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.gm-only-card { border-left: 2px solid var(--accent) !important; }

.char-card:hover {
  border-color: var(--panel-border-light);
  background: rgba(50,28,10,0.8);
}
.char-avatar {
  width: 40px; height: 40px; border-radius: 2px;
  background: #2a1808;
  border: 1px solid var(--panel-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; opacity: 0.6; flex-shrink: 0;
}
.char-card-name {
  font-family: "Cinzel", Georgia, serif;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--parchment);
  margin-bottom: 2px;
}
.char-card-role {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}
.char-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

/* Tags */
.tag-civic        { background:#3a2a10; color:#c4a060; border:1px solid #6a4a20; }
.tag-commerce     { background:#2a1a10; color:#c47840; border:1px solid #5a3a20; }
.tag-religious    { background:#2a2a3a; color:#9090c4; border:1px solid #4a4a6a; }
.tag-mysterious   { background:#2a1a2a; color:#c060c0; border:1px solid #5a3a5a; }
.tag-infrastructure { background:#2a3a4a; color:#7ac0d4; border:1px solid #3a5a6a; }
.tag-arcane       { background:#1a2a1a; color:#60a460; border:1px solid #3a5a3a; }
.tag-industrial   { background:#2a2a2a; color:#909090; border:1px solid #4a4a4a; }
.tag-clean        { background:#1a2a1a; color:#70b470; border:1px solid #3a5a3a; }
.tag-cult         { background:#2a0a0a; color:#c04040; border:1px solid #5a1a1a; }
.tag-victim       { background:#3a2a10; color:#d4a040; border:1px solid #6a4a10; }
.tag-neutral      { background:#202020; color:#909090; border:1px solid #404040; }

/* GM Modal */
#gmModal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 200;
  align-items: center; justify-content: center;
}
#gmModal.open { display: flex; }
.modal-box {
  background: var(--panel-mid); border: 1px solid var(--panel-border-light);
  border-radius: 4px; padding: 28px 32px;
  display: flex; flex-direction: column; gap: 16px;
  min-width: 280px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}
.modal-box h3 {
  font-family: "Cinzel", Georgia, serif; color: var(--parchment);
  font-size: 13px; letter-spacing: 0.2em; text-align: center;
}
.modal-box input {
  background: #0e0a04; border: 1px solid var(--panel-border);
  border-radius: 2px; padding: 9px 12px; color: var(--parchment);
  font-family: "Palatino Linotype", Palatino, Georgia, serif;
  font-size: 15px; letter-spacing: 0.12em; outline: none; text-align: center;
}
.modal-box input:focus { border-color: var(--accent); }
.modal-row { display: flex; gap: 8px; }
.modal-btn {
  flex:1; padding:9px; border-radius:2px; cursor:pointer;
  font-family:"Cinzel",Georgia,serif; font-size:11px;
  letter-spacing:0.1em; border:none; transition:opacity 0.15s;
}
.modal-btn.confirm { background:var(--accent); color:var(--parchment); }
.modal-btn.cancel  { background:#2a1a08; color:var(--text-muted); border:1px solid var(--panel-border); }
.modal-btn:hover { opacity:0.85; }
.modal-err { font-size:11px; color:#c05030; text-align:center; font-style:italic; min-height:16px; }

/* Hotspot SVG styles */
.loc-hotspot .pulse-ring { transition: opacity 0.2s; }
.loc-hotspot:hover .pulse-ring { opacity:1; stroke:#4ec0d4; stroke-width:2; }
.loc-hotspot.active .pulse-ring { opacity:1; stroke:#4ec0d4; stroke-width:2.5; fill:rgba(78,192,212,0.12); }

@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #0e0a04; }
::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="topbar-left">
    <span id="site-title">MARKETPLACE</span>
    <div id="breadcrumb"></div>
  </div>
  <div id="topbar-right">
    <button id="gmBtn">&#128274; GM</button>
  </div>
</div>
<div id="gm-strip">&#9670; GM MODE ACTIVE &#9670;</div>

<!-- GM MODAL -->
<div id="gmModal">
  <div class="modal-box">
    <h3>GM ACCESS</h3>
    <input type="password" id="gmPwd" placeholder="passphrase" autocomplete="off">
    <div class="modal-err" id="gmErr"></div>
    <div class="modal-row">
      <button class="modal-btn cancel" id="gmCancel">Cancel</button>
      <button class="modal-btn confirm" id="gmConfirm">Enter</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CONTENT -->
  <div id="content">

    <!-- VISUAL AREA -->
    <div id="visual" class="map-mode">
      <div id="map-container"><svg viewBox="0 0 1600 1180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Marketplace cityscape map">
  <defs>
    <!-- soft drop shadow for buildings -->
    <filter id="drop" x="-10%" y="-10%" width="120%" height="125%">
      <feOffset in="SourceAlpha" dx="0.6" dy="1.4"></feOffset>
      <feGaussianBlur stdDeviation="0.5"></feGaussianBlur>
      <feColorMatrix values="0 0 0 0 0.22  0 0 0 0 0.13  0 0 0 0 0.07  0 0 0 0.55 0"></feColorMatrix>
      <feComposite in2="SourceGraphic" operator="out" result="shadowOnly"></feComposite>
      <feMerge><feMergeNode in="shadowOnly"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="bigshadow" x="-10%" y="-10%" width="120%" height="125%">
      <feOffset in="SourceAlpha" dx="2" dy="4"></feOffset>
      <feGaussianBlur stdDeviation="2.5"></feGaussianBlur>
      <feColorMatrix values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.05  0 0 0 0.5 0"></feColorMatrix>
      <feComposite in2="SourceGraphic" operator="out" result="shadowOnly"></feComposite>
      <feMerge><feMergeNode in="shadowOnly"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>

    <!-- subtle paper grain -->
    <pattern id="grain" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="transparent"></rect>
      <circle cx="7" cy="9" r="0.5" fill="#5a3a23" opacity="0.32"></circle>
      <circle cx="22" cy="3" r="0.5" fill="#5a3a23" opacity="0.28"></circle>
      <circle cx="33" cy="18" r="0.5" fill="#5a3a23" opacity="0.32"></circle>
      <circle cx="51" cy="11" r="0.5" fill="#5a3a23" opacity="0.28"></circle>
      <circle cx="13" cy="28" r="0.5" fill="#5a3a23" opacity="0.32"></circle>
      <circle cx="44" cy="34" r="0.5" fill="#5a3a23" opacity="0.28"></circle>
      <circle cx="28" cy="44" r="0.5" fill="#5a3a23" opacity="0.32"></circle>
      <circle cx="8" cy="51" r="0.5" fill="#5a3a23" opacity="0.28"></circle>
      <circle cx="49" cy="56" r="0.5" fill="#5a3a23" opacity="0.32"></circle>
    </pattern>

    <!-- field grass tufts -->
    <pattern id="grass" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#bca878"></rect>
      <g stroke="#7a8a52" stroke-width="0.7" stroke-linecap="round" fill="none">
        <path d="M6 28 q1 -4 0 -8"></path>
        <path d="M18 14 q1 -4 0 -8"></path>
        <path d="M30 30 q1 -4 0 -8"></path>
        <path d="M12 38 q1 -3 0 -6"></path>
        <path d="M34 8 q1 -3 0 -6"></path>
        <circle cx="22" cy="32" r="0.7" fill="#7a8a52" stroke="none"></circle>
        <circle cx="6" cy="10" r="0.7" fill="#7a8a52" stroke="none"></circle>
        <circle cx="36" cy="20" r="0.7" fill="#7a8a52" stroke="none"></circle>
      </g>
    </pattern>

    <!-- water ripples -->
    <pattern id="ripple" x="0" y="0" width="22" height="14" patternUnits="userSpaceOnUse">
      <rect width="22" height="14" fill="#6c95a8"></rect>
      <path d="M0 6 q5 -3 11 0 t11 0" stroke="#a3c4d2" stroke-width="0.7" fill="none" opacity="0.55"></path>
      <path d="M0 11 q5 -3 11 0 t11 0" stroke="#4a7488" stroke-width="0.5" fill="none" opacity="0.5"></path>
    </pattern>

    <!-- generic building parts -->
    <!-- roofs: small variations as symbols -->
  </defs>

  <!-- ============== BACKGROUND ============== -->
  <!-- Outer farmland / wash -->
  <rect width="1600" height="1180" fill="url(#grass)"></rect>
  <rect width="1600" height="1180" fill="#0b1106" opacity="0.02"></rect>

  

  <!-- forested patches -->
  <g opacity="0.92">
    <!-- NE forest -->
    <g transform="translate(0,0)">
      <ellipse cx="1430" cy="220" rx="170" ry="100" fill="#6e8048"></ellipse>
      <g fill="#5a6c38">
        <circle cx="1330" cy="180" r="14"></circle><circle cx="1370" cy="170" r="16"></circle><circle cx="1420" cy="160" r="14"></circle>
        <circle cx="1470" cy="180" r="15"></circle><circle cx="1510" cy="200" r="14"></circle><circle cx="1540" cy="240" r="14"></circle>
        <circle cx="1320" cy="240" r="13"></circle><circle cx="1360" cy="260" r="14"></circle><circle cx="1430" cy="280" r="16"></circle>
        <circle cx="1490" cy="270" r="13"></circle><circle cx="1520" cy="290" r="12"></circle>
      </g>
    </g>
    <!-- NW grove -->
    <g>
      <ellipse cx="160" cy="260" rx="110" ry="70" fill="#6e8048"></ellipse>
      <g fill="#5a6c38">
        <circle cx="100" cy="240" r="12"></circle><circle cx="140" cy="220" r="13"></circle><circle cx="180" cy="230" r="12"></circle>
        <circle cx="220" cy="250" r="13"></circle><circle cx="140" cy="280" r="12"></circle><circle cx="190" cy="290" r="11"></circle>
      </g>
    </g>
    <!-- SW field edge trees -->
    <g fill="#5a6c38">
      <circle cx="100" cy="900" r="10"></circle><circle cx="130" cy="912" r="11"></circle><circle cx="160" cy="900" r="10"></circle>
      <circle cx="120" cy="940" r="10"></circle><circle cx="180" cy="930" r="11"></circle>
    </g>
    <!-- E side near lightning tower path -->
    <g fill="#5a6c38">
      <circle cx="1410" cy="780" r="10"></circle><circle cx="1430" cy="792" r="11"></circle><circle cx="1460" cy="780" r="10"></circle>
      <circle cx="1490" cy="800" r="11"></circle><circle cx="1430" cy="820" r="10"></circle>
    </g>
  </g>

  <!-- farmland rectangles (tilled fields) -->
  <g opacity="0.9">
    <g fill="#c9b27a" stroke="#8a7240" stroke-width="0.6">

    role: "City Architect",
    location: 4,
    tags: [{label:"Civic", cls:"tag-civic"}],
    gmTags: [{label:"Above Cult", cls:"tag-cult"}],
    icon: "📐",
    desc: "Paranoid gnome city architect, contracted by House Cannith. Obsessed with 'symmetry' and 'sacred angles.' Political rival of Alden Voss.",
    details: [
      {l:"Role", v:"City architect, contracted by House Cannith"},
      {l:"Known for", v:"Obsession with 'sacred angles' and symmetry in all his designs."},
    ],
    gmDetails: [
      {l:"True role", v:"SIBERYS CULTIST. Blueprint tattoos encode ritual geometry. Designed structural cult geometry into key buildings including the Airship Tower."},
      {l:"Vault", v:"Hidden vault contains Eyes of the Deep (eldritch tracking gems)."},
    ],
    gm: "Hook: asks party to retrieve 'stolen' schematics — actually his own fakes to send them off track. His obsession with sacred angles is how cult geometry got into the tower's foundations without anyone questioning it.",
  },
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════

let state = {
  screen: 'map',       // 'map' | 'location' | 'charlist' | 'char'
  locationId: null,
  charId: null,
  gmMode: false,
};

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════

function navigate(screen, opts = {}) {
  state.screen = screen;
  if (opts.locationId !== undefined) state.locationId = opts.locationId;
  if (opts.charId !== undefined) state.charId = opts.charId;

  renderSidebar();
  renderContent();
  renderBreadcrumb();
}

// Normalize character ref: can be string ID or {id, gmOnly}
function getCharRef(ref) {
  if (typeof ref === 'string') return {id: ref, gmOnly: false};
  return ref;
}

// ═══════════════════════════════════════════
// RENDER SIDEBAR
// ═══════════════════════════════════════════

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  if (state.screen === 'map') {
    // Districts
    const distSec = makeSidebarSection('Districts');
    DISTRICTS.forEach(d => {
      const btn = makeSidebarBtn(d.name, () => {
        // TODO: navigate to district screen
        alert('District pages coming soon!');
      });
      distSec.appendChild(btn);
    });
    sidebar.appendChild(distSec);

    // Named Locations
    const locSec = makeSidebarSection('Notable Locations');
    Object.entries(LOCATIONS).forEach(([id, loc]) => {
      if (loc.districtOnly) return;
      const btn = makeSidebarBtn(loc.name, () => navigate('location', {locationId: parseInt(id)}));
      locSec.appendChild(btn);
    });
    sidebar.appendChild(locSec);

  } else if (state.screen === 'location') {
    const loc = LOCATIONS[state.locationId];

    const navSec = makeSidebarSection(loc.name);
    navSec.appendChild(makeSidebarBtn('Overview', () => navigate('location', {locationId: state.locationId}), true));
    if (loc.characters.length > 0) {
      navSec.appendChild(makeSidebarBtn('Characters', () => navigate('charlist', {locationId: state.locationId})));
    }
    if (loc.hooks && loc.hooks.length > 0) {
      navSec.appendChild(makeSidebarBtn('Quest Hooks', () => {}));
    }
    sidebar.appendChild(navSec);

    const backSec = makeSidebarSection('');
    backSec.appendChild(makeSidebarBtn('← Back to Map', () => navigate('map'), false, true));
    sidebar.appendChild(backSec);

  } else if (state.screen === 'charlist') {
    const loc = LOCATIONS[state.locationId];

    const navSec = makeSidebarSection(loc.name);
    navSec.appendChild(makeSidebarBtn('Overview', () => navigate('location', {locationId: state.locationId})));
    navSec.appendChild(makeSidebarBtn('Characters', () => navigate('charlist', {locationId: state.locationId}), true));
    sidebar.appendChild(navSec);

    const charSec = makeSidebarSection('Select Character');
    loc.characters.forEach(ref => {
      const {id: charId, gmOnly} = getCharRef(ref);
      if (gmOnly && !state.gmMode) return;
      const char = CHARACTERS[charId];
      if (!char) return;
      const btn = makeSidebarBtn(char.name, () => navigate('char', {locationId: state.locationId, charId}));
      if (gmOnly) btn.style.borderLeft = '2px solid #a64a30';
      charSec.appendChild(btn);
    });
    sidebar.appendChild(charSec);

    const backSec = makeSidebarSection('');
    backSec.appendChild(makeSidebarBtn('← Back to Map', () => navigate('map'), false, true));
    sidebar.appendChild(backSec);

  } else if (state.screen === 'char') {
    const loc = LOCATIONS[state.locationId];

    const navSec = makeSidebarSection(loc ? loc.name : 'Location');
    if (loc) {
      navSec.appendChild(makeSidebarBtn('Overview', () => navigate('location', {locationId: state.locationId})));
      navSec.appendChild(makeSidebarBtn('Characters', () => navigate('charlist', {locationId: state.locationId})));
    }
    sidebar.appendChild(navSec);

    const charSec = makeSidebarSection('Characters');
    if (loc) {
      loc.characters.forEach(ref => {
        const {id: cid, gmOnly} = getCharRef(ref);
        if (gmOnly && !state.gmMode) return;
        const c = CHARACTERS[cid];
        if (!c) return;
        const btn = makeSidebarBtn(c.name, () => navigate('char', {locationId: state.locationId, charId: cid}), cid === state.charId);
        if (gmOnly) btn.style.borderLeft = '2px solid #a64a30';
        charSec.appendChild(btn);
      });
    }
    sidebar.appendChild(charSec);

    const backSec = makeSidebarSection('');
    backSec.appendChild(makeSidebarBtn('← Back to Map', () => navigate('map'), false, true));
    sidebar.appendChild(backSec);
  }
}

function makeSidebarSection(title) {
  const sec = document.createElement('div');
  sec.className = 'sidebar-section';
  if (title) {
    const t = document.createElement('div');
    t.className = 'sidebar-section-title';
    t.textContent = title;
    sec.appendChild(t);
  }
  return sec;
}

function makeSidebarBtn(label, onClick, isActive = false, isBack = false) {
  const btn = document.createElement('button');
  btn.className = 'sidebar-btn' + (isActive ? ' active' : '') + (isBack ? ' back-btn' : '');
  btn.textContent = label;
  btn.addEventListener('click', onClick);
  return btn;
}

// ═══════════════════════════════════════════
// RENDER CONTENT
// ═══════════════════════════════════════════

function renderContent() {
  const visual = document.getElementById('visual');
  const mapContainer = document.getElementById('map-container');
  const placeholder = document.getElementById('visual-placeholder');
  const mapBlurb = document.getElementById('map-blurb');
  const infoPanel = document.getElementById('info-panel');

  // Reset
  mapBlurb.classList.remove('visible');
  infoPanel.classList.remove('visible');
  const existingPortrait = document.getElementById('char-portrait');
  if (existingPortrait) existingPortrait.style.display = 'none';
  infoPanel.innerHTML = '';

  if (state.screen === 'map') {
    visual.className = 'map-mode';
    mapContainer.style.display = 'block';
    placeholder.style.display = 'none';
    const oldPortrait = document.getElementById('char-portrait');
    if (oldPortrait) oldPortrait.style.display = 'none';

  } else if (state.screen === 'location') {
    const loc = LOCATIONS[state.locationId];
    visual.className = 'image-mode';
    mapContainer.style.display = 'none';
    placeholder.style.display = 'flex';
    document.getElementById('ph-icon').textContent = getLocationIcon(state.locationId);
    document.getElementById('ph-title').textContent = loc.name;
    document.getElementById('ph-sub').textContent = 'Illustration coming soon';

    infoPanel.classList.add('visible');
    infoPanel.innerHTML = buildLocationHTML(loc);

  } else if (state.screen === 'charlist') {
    const loc = LOCATIONS[state.locationId];
    visual.className = 'image-mode';
    mapContainer.style.display = 'none';
    placeholder.style.display = 'flex';
    document.getElementById('ph-icon').textContent = '👥';
    document.getElementById('ph-title').textContent = loc.name;
    document.getElementById('ph-sub').textContent = 'Notable characters';

    infoPanel.classList.add('visible');
    infoPanel.innerHTML = buildCharListHTML(loc);

  } else if (state.screen === 'char') {
    const char = CHARACTERS[state.charId];
    visual.className = 'image-mode';
    mapContainer.style.display = 'none';
    if (char.portrait) {
      placeholder.style.display = 'none';
      let img = document.getElementById('char-portrait');
      if (!img) {
        img = document.createElement('img');
        img.id = 'char-portrait';
        img.style.cssText = 'max-width:100%;max-height:750px;display:block;object-fit:contain;margin:0 auto;';
        img.crossOrigin = 'anonymous';
        img.crossOrigin = 'anonymous';
        visual.appendChild(img);
      }
      img.src = char.portrait;
      img.style.display = 'block';
    } else {
      // Hide portrait img if switching to a char without one
      const img = document.getElementById('char-portrait');
      if (img) img.style.display = 'none';
      placeholder.style.display = 'flex';
      document.getElementById('ph-icon').textContent = char.icon;
      document.getElementById('ph-title').textContent = char.name;
      document.getElementById('ph-sub').textContent = char.role + ' · Portrait coming soon';
    }

    infoPanel.classList.add('visible');
    infoPanel.innerHTML = buildCharHTML(char);
  }
}

function buildLocationHTML(loc) {
  return `
    <div class="info-section">
      <div class="info-label">Location</div>
      <div class="info-title">${loc.name}</div>
      <div style="margin:8px 0">
        <span class="info-tag ${loc.tagClass}">${loc.tag}</span>
      </div>
      <p class="info-desc">${loc.desc}</p>
    </div>
    <hr class="divider">
    <div class="info-section">
      <div class="info-label">Details</div>
      <table class="detail-table">${loc.details.map(d => `<tr><td>${d.l}</td><td>${d.v}</td></tr>`).join('')}</table>
      ${loc.gmDetails && loc.gmDetails.length ? `<table class="gm-detail-table">${loc.gmDetails.map(d => `<tr><td>${d.l}</td><td>${d.v}</td></tr>`).join('')}</table>` : ''}
    </div>
    ${loc.gm ? `<hr class="divider"><div class="gm-note"><strong>GM Note</strong>${loc.gm}</div>` : ''}
  `;
}

function buildCharListHTML(loc) {
  return `
    <div class="info-section">
      <div class="info-label">Notable Characters</div>
      <div class="char-list">
        ${loc.characters.filter(ref => { const {gmOnly} = getCharRef(ref); return !gmOnly || state.gmMode; }).map(ref => {
          const {id: cid, gmOnly} = getCharRef(ref);
          const c = CHARACTERS[cid];
          if (!c) return '';
          return `<div class="char-card${gmOnly ? ' gm-only-card' : ''}" onclick="navigate('char', {locationId: state.locationId, charId: '${cid}'})">
            <div class="char-avatar">${c.icon}</div>
            <div>
              <div class="char-card-name">${c.name}</div>
              <div class="char-card-role">${c.role}</div>
              <div class="char-card-tags">${c.tags.map(t => `<span class="info-tag ${t.cls}" style="font-size:9px;padding:1px 6px">${t.label}</span>`).join('') + (c.gmTags||[]).map(t => `<span class="info-tag ${t.cls} gm-only-tag" style="font-size:9px;padding:1px 6px">${t.label}</span>`).join('')}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function buildCharHTML(char) {
  return `
    <div class="info-section">
      <div class="info-label">Character</div>
      <div class="info-title">${char.name}</div>
      <div style="margin:6px 0 10px">
        ${char.tags.map(t => `<span class="info-tag ${t.cls}">${t.label}</span>`).join('') + (char.gmTags||[]).map(t => `<span class="info-tag ${t.cls} gm-only-tag">${t.label}</span>`).join('')}
      </div>
      <p class="info-desc">${char.desc}</p>
    </div>
    <hr class="divider">
    <div class="info-section">
      <div class="info-label">Details</div>
      <table class="detail-table">${char.details.map(d => `<tr><td>${d.l}</td><td>${d.v}</td></tr>`).join('')}</table>
      ${char.gmDetails && char.gmDetails.length ? `<table class="gm-detail-table">${char.gmDetails.map(d => `<tr><td>${d.l}</td><td>${d.v}</td></tr>`).join('')}</table>` : ''}
    </div>
    ${char.gm ? `<hr class="divider"><div class="gm-note"><strong>GM Note</strong>${char.gm}</div>` : ''}
  `;
}

function getLocationIcon(id) {
  const icons = {1:'🏛️',2:'⚖️',3:'⚙️',4:'🌈',5:'⚡',6:'🚢',7:'🔬',8:'🗼'};
  return icons[id] || '📍';
}

// ═══════════════════════════════════════════
// BREADCRUMB
// ═══════════════════════════════════════════

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '';

  const crumbs = [{label:'City Map', action:() => navigate('map')}];

  if (state.screen === 'location' || state.screen === 'charlist' || state.screen === 'char') {
    const loc = LOCATIONS[state.locationId];
    crumbs.push({label: loc.name, action: () => navigate('location', {locationId: state.locationId})});
  }
  if (state.screen === 'charlist') {
    crumbs.push({label:'Characters', action: null});
  }
  if (state.screen === 'char') {
    crumbs.push({label:'Characters', action: () => navigate('charlist', {locationId: state.locationId})});
    crumbs.push({label: CHARACTERS[state.charId].name, action: null});
  }

  crumbs.forEach((c, i) => {
    if (i > 0) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '›';
      bc.appendChild(sep);
    }
    const span = document.createElement('span');
    span.className = 'crumb' + (i === crumbs.length - 1 ? ' active' : '');
    span.textContent = c.label;
    if (c.action) span.addEventListener('click', c.action);
    bc.appendChild(span);
  });
}

// ═══════════════════════════════════════════
// MAP HOTSPOTS
// ═══════════════════════════════════════════

let activeMapHotspot = null;

document.querySelectorAll('.loc-hotspot').forEach(el => {
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = parseInt(el.dataset.loc);
    const loc = LOCATIONS[id];
    if (!loc) return;

    if (activeMapHotspot) activeMapHotspot.classList.remove('active');
    el.classList.add('active');
    activeMapHotspot = el;

    // Show quick blurb
    const blurb = document.getElementById('map-blurb');
    document.getElementById('map-blurb-name').textContent = loc.name;
    const tag = document.getElementById('map-blurb-tag');
    tag.textContent = loc.tag;
    tag.className = 'info-tag ' + loc.tagClass;
    document.getElementById('map-blurb-desc').textContent = loc.desc;
    blurb.classList.add('visible');

    document.getElementById('map-blurb-goto').onclick = () => navigate('location', {locationId: id});
    document.getElementById('map-blurb-close').onclick = () => {
      blurb.classList.remove('visible');
      el.classList.remove('active');
      activeMapHotspot = null;
    };
  });
});

// ═══════════════════════════════════════════
// GM MODE
// ═══════════════════════════════════════════

const GM_PASS = 'Argonnessen';

const gmBtn = document.getElementById('gmBtn');
const gmModal = document.getElementById('gmModal');
const gmPwd = document.getElementById('gmPwd');
const gmErr = document.getElementById('gmErr');

gmBtn.addEventListener('click', () => {
  if (state.gmMode) {
    state.gmMode = false;
    document.body.classList.remove('gm-mode');
    gmBtn.classList.remove('active');
    gmBtn.innerHTML = '&#128274; GM';
  } else {
    gmPwd.value = '';
    gmErr.textContent = '';
    gmModal.classList.add('open');
    setTimeout(() => gmPwd.focus(), 50);
  }
});

function tryUnlock() {
  if (gmPwd.value === GM_PASS) {
    state.gmMode = true;
    document.body.classList.add('gm-mode');
    gmBtn.classList.add('active');
    gmBtn.innerHTML = '&#128275; GM';
    gmModal.classList.remove('open');
  } else {
    gmErr.textContent = 'Incorrect passphrase.';
    gmPwd.value = '';
    gmPwd.focus();
  }
}

document.getElementById('gmConfirm').addEventListener('click', tryUnlock);
document.getElementById('gmCancel').addEventListener('click', () => gmModal.classList.remove('open'));
gmPwd.addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
  if (e.key === 'Escape') gmModal.classList.remove('open');
});
gmModal.addEventListener('click', e => { if (e.target === gmModal) gmModal.classList.remove('open'); });

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════

navigate('map');
</script>
</body>
</html>
